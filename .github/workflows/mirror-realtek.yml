name: Mirror realtek-r8125-dkms

on:
  workflow_dispatch: # 仅保留手动触发

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ========================================================
      # 1. 配置 SSH 环境 (Cloud Only 必须步骤)
      # ========================================================
      - name: Configure SSH
        env:
          # 引用你的 Secret 私钥
          SSH_PRIVATE_KEY_88ALT: ${{ secrets.SSH_PRIVATE_KEY_88ALT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # 写入私钥
          echo "$SSH_PRIVATE_KEY_88ALT" > ~/.ssh/id_rsa_88alt
          chmod 600 ~/.ssh/id_rsa_88alt
          
          # 生成配置文件 (让 github-88alt 别名生效)
          cat <<EOF > ~/.ssh/config
          Host github-88alt
            HostName github.com
            User git
            IdentityFile ~/.ssh/id_rsa_88alt
            StrictHostKeyChecking no
          EOF

      # ========================================================
      # 2. 执行同步脚本 (已修改为云端路径)
      # ========================================================
      - name: Run Sync Script
        shell: bash
        run: |
          set -e

          # --- 配置区域 ---
          SOURCE_REPO="https://github.com/timeflysoon/realtek-r8125-dkms.git"
          # 【修改点】云端直接使用当前目录下的相对路径
          MIRROR_DIR="realtek-r8125-dkms.git" 
          TARGET_REPOS=(
              "git@github-88alt:88alt/realtek-r8125-dkms.git"
          )

          echo "=== 开始同步镜像仓库 $(date '+%Y-%m-%d %H:%M:%S') ==="

          # 1. 检查并创建/使用镜像仓库
          if [ ! -d "$MIRROR_DIR" ]; then
              echo "本地镜像目录不存在，正在创建..."
              git clone --mirror "$SOURCE_REPO" "$MIRROR_DIR" || {
                  echo "错误：克隆失败！"
                  exit 1
              }
          fi

          # 进入镜像目录
          cd "$MIRROR_DIR" || exit 1

          # 2. 确保远程源配置正确
          if ! git remote | grep -q "^origin$"; then
              echo "配置远程源 origin..."
              git remote add origin "$SOURCE_REPO"
          fi

          # 3. 修改 fetch refspec - 只抓取分支和标签
          echo "配置 fetch refspec..."
          git config --unset-all remote.origin.fetch 2>/dev/null || true
          git config --add remote.origin.fetch '+refs/heads/*:refs/heads/*'
          git config --add remote.origin.fetch '+refs/tags/*:refs/tags/*'

          # 4. 清理残留的 refs
          echo "清理历史遗留的 PR refs..."
          git for-each-ref --format='delete %(refname)' refs/pull 2>/dev/null | git update-ref --stdin 2>/dev/null || true
          git for-each-ref --format='delete %(refname)' refs/remotes/origin/pull 2>/dev/null | git update-ref --stdin 2>/dev/null || true

          # 5. 获取最新更新
          echo "从源仓库获取更新..."
          if git fetch --prune origin; then
              echo "获取成功"
          else
              echo "错误：获取更新失败！"
              exit 1
          fi

          # 6. 推送到所有目标仓库
          for TARGET_REPO in "${TARGET_REPOS[@]}"; do
              ALIAS=$(echo "$TARGET_REPO" | cut -d'@' -f2 | cut -d':' -f1)
              echo "------------------------------------------------------"
              echo "正在推送到: $ALIAS"
              
              MAX_RETRY=2
              for i in $(seq 1 $MAX_RETRY); do
                  if git push --mirror "$TARGET_REPO"; then
                      echo "✓ 推送成功"
                      break
                  else
                      if [ $i -eq $MAX_RETRY ]; then
                          echo "✗ 推送失败（已达最大重试次数）"
                          exit 1 # 在 Actions 里失败需要退出代码 1 以便标记为失败
                      else
                          echo "推送失败，5秒后重试 ($i/$MAX_RETRY)..."
                          sleep 5
                      fi
                  fi
              done
          done

          echo "=== 同步完成 $(date '+%Y-%m-%d %H:%M:%S') ==="
