name: Z-Account Auto KeepAlive

on:
  schedule:
    # 每天 UTC 0,6,12,18 点运行
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  run-cloud-script:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Requests
        run: pip install requests

      - name: Random Delay
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo ">>> Manual Trigger: Skipping delay."
            exit 0
          else
            echo ">>> Schedule Trigger: Random sleeping..."
            WAIT_SEC=$((RANDOM % 3600))
            echo "Sleeping for ${WAIT_SEC} seconds"
            sleep $WAIT_SEC
          fi

      - name: Run Script
        env:
          Z_CLIENT_ID: ${{ secrets.Z_CLIENT_ID }}
          Z_CLIENT_SECRET: ${{ secrets.Z_CLIENT_SECRET }}
          Z_REFRESH_TOKEN: ${{ secrets.Z_REFRESH_TOKEN }}
          Z_TENANT_ID: ${{ secrets.Z_TENANT_ID }}
        run: python main.py
