name: Z-Account Auto KeepAlive

on:
  schedule:
    # 每天 0点, 6点, 12点, 18点 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  run-z-account:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # 【核心：消除 Node.js 20 警告】
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Requests
        run: pip install requests

      - name: Random Delay
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo ">>> Manual Trigger: Skipping delay."
          else
            # 随机休眠 0-60 分钟 (3600秒)
            WAIT_SEC=$((RANDOM % 3600))
            echo "错峰执行，随机等待 ${WAIT_SEC} 秒..."
            sleep $WAIT_SEC
          fi

      - name: Run Script for Account Z
        env:
          GITHUB_REPO_NAME: ${{ github.repository }}
          CLIENT_ID: ${{ secrets.Z_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.Z_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.Z_REFRESH_TOKEN }}
          TENANT_ID: ${{ secrets.Z_TENANT_ID }}
        run: python main.py
