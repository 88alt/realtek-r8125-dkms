name: Z-Account Auto KeepAlive

on:
  schedule:
    - cron: '0 */6 * * *' # 每6小时一次
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-z-account:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install requests

      - name: Random Delay
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            exit 0
          fi
          # Z账号设定1小时随机范围，错峰效果更好
          WAIT_SEC=$((RANDOM % 3600))
          echo "Waiting $WAIT_SEC seconds..."
          sleep $WAIT_SEC

      - name: Run Script
        env:
          GITHUB_REPO_NAME: ${{ github.repository }}
          CLIENT_ID: ${{ secrets.Z_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.Z_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.Z_REFRESH_TOKEN }}
          TENANT_ID: ${{ secrets.Z_TENANT_ID }}
        run: python main.py
