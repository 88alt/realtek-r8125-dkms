- name: 🎲 Random Delay & Probability
        shell: bash
        run: |
          # --- 逻辑分支 ---
          
          # 情况 A: 手动触发 (测试/强行保活)
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo ">>> [Test Mode] 检测到手动触发 (Workflow Dispatch)。"
            echo ">>> 跳过随机等待，立即执行脚本！"
            # 直接退出当前 step，进入下一步运行 Python
            exit 0
          fi

          # 情况 B: 定时任务 (Schedule) - 只有这时才进行拟人化等待
          echo ">>> [Auto Mode] 检测到定时触发。"
          
          # 1. 30% 概率“今天不上线” (可选，防止每天都跑太规律)
          # 注意：为了让逻辑简单，这里我们只打印日志，真的跳过需要复杂的 job控制
          # 这里仅做随机等待
          
          # 2. 生成随机等待时间 (0 - 3600秒)
          WAIT_SEC=$((RANDOM % 3600))
          echo ">>> 模拟人类行为，将挂机等待 ${WAIT_SEC} 秒..."
          sleep $WAIT_SEC
