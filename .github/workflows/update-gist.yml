name: Auto Update Gist with Airport Subscription

on:
  schedule:
    - cron: '0 0 * * 1'          # 每周一 00:00 UTC（北京时间周一 08:00）
  workflow_dispatch:
    inputs:
      sub_url:
        description: '机场订阅链接（留空使用默认）'
        required: false
        default: ''
      force_update:
        description: '强制覆盖 Gist（即使内容未变化）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  update-gist:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # 增加超时时间

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch and conditionally update Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_FILE: "duobao.yaml"
          
        run: |
          python - << 'EOF'
          import requests
          import hashlib
          import os
          import sys
          import time
          from datetime import datetime
          import base64

          print("🚀 Gist 自动更新任务开始")
          print("=" * 60)
          
          # 获取环境变量
          token = os.getenv('GIST_TOKEN')
          gist_id = os.getenv('GIST_ID')
          gist_file = os.getenv('GIST_FILE')
          
          if not gist_id or gist_id.strip() == "":
              print("❌ 致命错误: GIST_ID 为空或未设置")
              sys.exit(1)
              
          if not token or token.strip() == "":
              print("❌ 致命错误: GIST_TOKEN 为空或未设置")
              sys.exit(1)

          # 从输入获取
          sub_url_input = "${{ inputs.sub_url }}" or ""
          force = "${{ inputs.force_update }}" == "true"

          # 默认订阅链接列表
          default_sub_urls = [
              "http://dbsub2.whtjdasha.com/s/b6ea7e4e77c3037cc6ffd6de407c04d6",
              "https://raw.githubusercontent.com/freefq/free/master/v2",
              "https://getafreenode.com/subscribe.php?subtype=1",
          ]

          print(f"⚡ 强制更新: {force}")
          print(f"📄 Gist文件: {gist_file}")

          headers = {
              'Authorization': f'token {token}',
              'Accept': 'application/vnd.github.v3+json'
          }

          # 1. 获取当前 Gist
          print("\n1. 获取当前Gist内容...")
          gist_url = f"https://api.github.com/gists/{gist_id}"
          
          try:
              resp = requests.get(gist_url, headers=headers, timeout=10)
              
              if resp.status_code != 200:
                  print(f"❌ 获取Gist失败: {resp.status_code}")
                  sys.exit(1)
                  
              gist = resp.json()
          except Exception as e:
              print(f"❌ 获取Gist时出错: {e}")
              sys.exit(1)

          if gist_file not in gist['files']:
              print(f"❌ 错误：Gist中不存在文件 '{gist_file}'")
              sys.exit(1)

          old_content = gist['files'][gist_file]['content']
          old_hash = hashlib.sha256(old_content.encode('utf-8')).hexdigest()
          print(f"✅ Gist获取成功，当前哈希: {old_hash[:12]}...")

          # 2. 拉取订阅内容
          print(f"\n2. 拉取订阅内容...")
          
          def fetch_with_retry(url, max_retries=3):
              for attempt in range(max_retries):
                  try:
                      print(f"  尝试 {attempt + 1}/{max_retries}...")
                      
                      # 添加浏览器请求头
                      request_headers = {
                          'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                          'Accept': 'text/plain,application/x-yaml,text/yaml,*/*',
                          'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
                          'Connection': 'keep-alive',
                      }
                      
                      # 使用会话
                      session = requests.Session()
                      session.headers.update(request_headers)
                      
                      response = session.get(url, timeout=15, verify=False)
                      response.raise_for_status()
                      
                      content = response.text.strip()
                      if not content:
                          raise ValueError("返回内容为空")
                          
                      print(f"  ✅ 第 {attempt + 1} 次尝试成功")
                      return content
                      
                  except Exception as e:
                      print(f"  ⚠️ 尝试 {attempt + 1} 失败: {type(e).__name__}")
                      if attempt == max_retries - 1:
                          raise
                      time.sleep(2 * (attempt + 1))
          
          def validate_subscription_content(content):
              if not content or len(content.strip()) < 50:
                  return False
              
              # 检查是否为base64编码
              try:
                  if len(content) % 4 == 0:
                      decoded = base64.b64decode(content).decode('utf-8', errors='ignore')
                      if 'proxies' in decoded.lower() or 'server' in decoded.lower():
                          print("  ✅ 检测到有效的base64编码Clash配置")
                          return True
              except:
                  pass
              
              # 检查明文配置
              content_lower = content.lower()
              keywords = ['proxies:', 'proxy-groups:', 'rules:', 'port:', 'server:']
              matches = sum(1 for keyword in keywords if keyword in content_lower)
              
              return matches >= 2
          
          # 确定要使用的订阅链接
          if sub_url_input.strip():
              target_urls = [sub_url_input.strip()]
          else:
              target_urls = default_sub_urls
          
          new_content = None
          for i, url in enumerate(target_urls):
              print(f"\n尝试链接 {i+1}/{len(target_urls)}: {url}")
              try:
                  content = fetch_with_retry(url, max_retries=2)
                  if validate_subscription_content(content):
                      new_content = content
                      print(f"✅ 链接 {i+1} 可用")
                      break
                  else:
                      print(f"⚠️ 链接 {i+1} 内容格式无效")
              except Exception as e:
                  print(f"❌ 链接 {i+1} 失败: {e}")
          
          if not new_content:
              print("❌ 所有订阅链接均失败，使用当前Gist内容")
              new_content = old_content
          
          new_hash = hashlib.sha256(new_content.encode('utf-8')).hexdigest()
          print(f"\n新内容哈希: {new_hash[:12]}...")

          # 3. 判断是否更新
          print(f"\n3. 检查更新条件...")
          if new_hash == old_hash:
              if force:
                  print("✅ 内容哈希相同，但启用强制更新模式")
              else:
                  print("⏭️  内容未变化，跳过更新")
                  sys.exit(0)
          else:
              print(f"🔄 检测到内容变化 (旧: {old_hash[:8]}... 新: {new_hash[:8]}...)")

          # 4. 更新 Gist
          print(f"\n4. 更新Gist...")
          now = datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')
          update_payload = {
              "description": f"自动更新 - {now}",
              "files": {
                  gist_file: {
                      "content": new_content,
                      "filename": gist_file
                  }
              }
          }

          try:
              update_resp = requests.patch(gist_url, headers=headers, json=update_payload, timeout=10)
              update_resp.raise_for_status()
              print("✅ Gist 更新成功！")
              print(f"   Gist链接: https://gist.github.com/{gist_id}")
          except Exception as e:
              print(f"❌ Gist更新失败: {e}")
              sys.exit(1)

          print("=" * 60)
          print("🎉 任务完成！Gist已更新")
          EOF
