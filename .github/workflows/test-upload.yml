name: Test OneDrive Upload

on:
  workflow_dispatch:

jobs:
  test-upload:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Upload test file to OneDrive
        shell: pwsh
        env:
          OD_CLIENT_ID: ${{ secrets.OD_CLIENT_ID }}
          OD_CLIENT_SECRET: ${{ secrets.OD_CLIENT_SECRET }}
          OD_TENANT_ID: ${{ secrets.OD_TENANT_ID }}
        run: |
          # 1、 生成一个小测试文件
          $localFile = "test.txt"
          Set-Content -Path $localFile -Value "Hello OneDrive!"

          # 2、 获取 Access Token
          $tokenResponse = Invoke-RestMethod -Method Post `
              -Uri "https://login.microsoftonline.com/$env:OD_TENANT_ID/oauth2/v2.0/token" `
              -ContentType "application/x-www-form-urlencoded" `
              -Body @{
                  client_id     = $env:OD_CLIENT_ID
                  scope         = "https://graph.microsoft.com/.default"
                  client_secret = $env:OD_CLIENT_SECRET
                  grant_type    = "client_credentials"
              }
          $accessToken = $tokenResponse.access_token

          # 3、 OneDrive 文件夹共享链接（ESXi-Custom-ISO）
          $sharedLink = "https://xs9888outlook-my.sharepoint.com/my?id=%2Fpersonal%2Fx%5Fxs9888outlook%5Fonmicrosoft%5Fcom%2FDocuments%2FESXi%2DCustom%2DISO&viewid=5f3047b5-37d1-41fc-8f65-d63151c422ca"

          # 4、 获取 driveId 和 folderPath
          $encodedLink = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($sharedLink)).TrimEnd("=")
          $shareUrl = "https://graph.microsoft.com/v1.0/shares/u!$encodedLink/driveItem"
          $driveInfo = Invoke-RestMethod -Method Get -Uri $shareUrl -Headers @{ Authorization = "Bearer $accessToken" }
          $driveId    = $driveInfo.parentReference.driveId
          $folderPath = $driveInfo.name

          # 5、 上传文件
          $uploadUrl = "https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${folderPath}/${localFile}:/content"
          $response = Invoke-RestMethod -Method Put `
              -Uri $uploadUrl `
              -Headers @{ Authorization = "Bearer $accessToken" } `
              -InFile $localFile `
              -ContentType "application/octet-stream"

          Write-Host "✅ 上传完成！文件 ID:" $response.id
